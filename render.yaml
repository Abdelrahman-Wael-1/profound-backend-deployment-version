services:
  - type: web
    name: profound-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: GROQ_API_KEY_ANALYSIS
        sync: false
      - key: GROQ_API_KEY_EXAM
        sync: false
      - key: GROQ_API_KEY_LECTURE
        sync: false
      - key: GROQ_API_KEY_GRADING
        sync: false
